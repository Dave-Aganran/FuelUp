services:
  - type: web
    name: fuelup-poc
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fuelup-poc-db
          property: connectionString

databases:
  - name: fuelup-poc-db
    plan: free
