services:
  - type: web
    name: fuelup-poc
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: true
      - key: MAX_REQUEST_BODY
        value: 20kb
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: COOKIE_SECURE
        value: true
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PAYMENT_PROVIDER
        value: demo
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AUTO_MIGRATE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: fuelup-poc-db
          property: connectionString

databases:
  - name: fuelup-poc-db
    plan: free
